name: Bug Report
description: Report a bug or unexpected behavior in the dashboard
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more concrete the repro, the faster we can fix it.

        **Security vulnerabilities:** do **not** file them here — report privately via GitHub Security Advisories.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of what's broken.
      placeholder: e.g. "Sign-in fails with 'state mismatch' when accessed over plain HTTP"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error message verbatim.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      description: e.g. "Chrome 142 on Ubuntu 24.04", "Safari 18 on macOS 15"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node -v`. Only required for server-side / build issues.
      placeholder: v20.11.0

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: pm2 logs, browser console output, or screenshots. Use code fences for log output.
      render: shell
