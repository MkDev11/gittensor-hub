name: Feature Request
description: Suggest a new feature or improvement
title: "[feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The more clearly you can describe the *problem* you're trying to solve, the easier it is to evaluate the proposal.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you running into? Who does it affect?
      placeholder: "When triaging across many SN74 repos, I currently have to ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? UI sketch, API shape, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't quite fit.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to related issues / PRs, prior discussions.
